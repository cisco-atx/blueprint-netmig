{% extends "atx.home.html" %}

{% block sidebar %}

<!-- Sidebar Stylesheet -->
<link
        rel="stylesheet"
        id="theme-stylesheet"
        href="{{ url_for('netmig.static', filename='css/common.css') }}"
>

<!-- Sidebar Container -->
<div style="display: flex; flex-direction: column; height: calc(100vh - 64px);">

    <!-- Script Menu Section -->
    <div>
        {% for script_id, script_data in scripts.items() %}
        <!-- Individual Menu Item -->
        <div
                class="menu-item"
                data-href="{{ url_for('netmig.render_script', script_id=script_id) }}"
        >
            <!-- Script Icon -->
            <span class="material-icons menu">
          {{ script_data.icon }}
        </span>

            <!-- Script Name -->
            <span class="menu-text">
          {{ script_data.name }}
        </span>
        </div>
        {% endfor %}
    </div>

    <!-- Admin Section (Pinned to Bottom) -->
    <div
            class="menu-item admin-only"
            style="margin-top: auto;"
            data-href="{{ url_for('netmig.manage_scripts') }}"
    >
        <!-- Admin Icon -->
        <span class="material-icons menu">
      app_registration
    </span>

        <!-- Admin Label -->
        <span class="menu-text">
      Manage
    </span>
    </div>

</div>

{% endblock %}
